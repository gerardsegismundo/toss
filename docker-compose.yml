version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: toss-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  app:
    build: .
    container_name: toss-app
    ports:
      - "5000:5000"
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/toss
      - PORT=5000
      - NODE_ENV=development
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ./server:/app/server
      - ./client:/app/client
      - ./package.json:/app/package.json
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data: